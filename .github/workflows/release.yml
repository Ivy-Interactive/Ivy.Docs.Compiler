name: release

permissions:
  contents: write
  id-token: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ci-checks:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cargo fmt
        run: cargo fmt --manifest-path src/ivy-docs-cli/Cargo.toml -- --check
      - name: Cargo clippy
        run: cargo clippy --manifest-path src/ivy-docs-cli/Cargo.toml -- -D warnings
      - name: Cargo test
        run: cargo test --manifest-path src/ivy-docs-cli/Cargo.toml

  build-rust:
    name: Build (${{ matrix.platform }})
    needs: ci-checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, platform: linux-x64, binary: ivy-docs-cli }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, platform: win-x64, binary: ivy-docs-cli.exe }
          - { os: windows-latest, target: aarch64-pc-windows-msvc, platform: win-arm64, binary: ivy-docs-cli.exe }
          - { os: macos-15-intel, target: x86_64-apple-darwin, platform: osx-x64, binary: ivy-docs-cli }
          - { os: macos-14, target: aarch64-apple-darwin, platform: osx-arm64, binary: ivy-docs-cli }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"
      - run: cargo build --release --manifest-path src/ivy-docs-cli/Cargo.toml --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: src/ivy-docs-cli/target/${{ matrix.target }}/release/${{ matrix.binary }}

  pack-sign-publish:
    needs: build-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - uses: actions/download-artifact@v4
        with:
          path: native-artifacts

      - name: Organize native binaries
        run: |
          for platform in linux-x64 win-x64 win-arm64 osx-x64 osx-arm64; do
            mkdir -p nuget/Ivy.Docs.Compiler/runtimes/$platform/native/
            cp native-artifacts/native-$platform/* nuget/Ivy.Docs.Compiler/runtimes/$platform/native/
          done

      - name: Parse version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Pack
        run: dotnet pack nuget/Ivy.Docs.Compiler/Ivy.Docs.Compiler.csproj -c Release -o ./nupkg /p:PackageVersion=${{ steps.version.outputs.VERSION }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: rorychatt-ivy

      - name: Clean NuGet output before signing
        run: |
          find ./nupkg -mindepth 1 -maxdepth 1 -not -name "*.nupkg" -exec rm -rf {} +
          mkdir -p ./nupkg_signed

      - name: Sign NuGet packages
        uses: sslcom/esigner-codesign@develop
        with:
          command: batch_sign
          username: ${{ secrets.SSL_COM_USERNAME }}
          password: ${{ secrets.SSL_COM_PASSWORD }}
          credential_id: ${{ secrets.SSL_COM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSL_COM_TOTP_SECRET }}
          malware_block: true
          dir_path: nupkg
          output_path: nupkg_signed

      - name: Overwrite with signed NuGet
        run: cp -f ./nupkg_signed/*.nupkg ./nupkg/

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  create-release:
    needs: pack-sign-publish
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          # Create tag if it doesn't exist
          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true
          # Create release with auto-generated notes
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --latest
