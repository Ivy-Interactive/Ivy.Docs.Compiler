name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-rust:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, platform: linux-x64, binary: ivy-docs-cli }
          - { os: ubuntu-24.04-arm64, target: aarch64-unknown-linux-gnu, platform: linux-arm64, binary: ivy-docs-cli }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, platform: win-x64, binary: ivy-docs-cli.exe }
          - { os: windows-latest, target: aarch64-pc-windows-msvc, platform: win-arm64, binary: ivy-docs-cli.exe }
          - { os: macos-15-intel, target: x86_64-apple-darwin, platform: osx-x64, binary: ivy-docs-cli }
          - { os: macos-14, target: aarch64-apple-darwin, platform: osx-arm64, binary: ivy-docs-cli }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"
      - run: cargo build --release --manifest-path src/ivy-docs-cli/Cargo.toml --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.platform }}
          path: src/ivy-docs-cli/target/${{ matrix.target }}/release/${{ matrix.binary }}

  pack-and-publish:
    needs: build-rust
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: native-artifacts
      - name: Organize native binaries
        run: |
          for platform in linux-x64 linux-arm64 win-x64 win-arm64 osx-x64 osx-arm64; do
            mkdir -p nuget/Ivy.Docs.Compiler/runtimes/$platform/native/
            cp native-artifacts/native-$platform/* nuget/Ivy.Docs.Compiler/runtimes/$platform/native/
          done
      - name: Decode certificate
        run: |
          echo "${{ secrets.CODE_SIGNING_CERT }}" | base64 -d > ${{ runner.temp }}/signing-cert.pfx
      - name: Parse version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Build.props)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Pack
        run: dotnet pack nuget/Ivy.Docs.Compiler/Ivy.Docs.Compiler.csproj -c Release -o output /p:PackageVersion=${{ steps.version.outputs.VERSION }}
      - name: Sign NuGet package
        run: |
          dotnet nuget sign output/*.nupkg \
            --certificate-path "$CERT_PATH" \
            --certificate-password "${{ secrets.CERT_PASSWORD }}" \
            --timestamper http://timestamp.digicert.com
        env:
          CERT_PATH: ${{ runner.temp }}/signing-cert.pfx
      - name: Publish to NuGet
        run: dotnet nuget push output/*.nupkg --api-key ${{ secrets.PUBLISH_TOKEN }} --source "https://api.nuget.org/v3/index.json" --skip-duplicate
